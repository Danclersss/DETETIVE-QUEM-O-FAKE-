        .card { 
            background: var(--card); padding: 2rem; border-radius: 40px; 
            width: 90%; max-width: 400px; text-align: center;

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

            background: var(--primary); color: #fff; border: none; padding: 16px;

            cursor: pointer; margin-top: 10px; transition: 0.3s; 
            border-bottom: 4px solid #4a0404; font-family: 'Outfit';

        .btn-main:active { transform: translateY(2px); border-bottom-width: 2px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); border-bottom: 4px solid var(--secondary); }
        .btn-danger { background: #600; border-bottom-color: #300; }

        input, select { 
            width: 100%; padding: 15px; background: #221111; border: 1px solid var(--primary); 
            border-radius: 15px; color: white; margin-top: 10px; box-sizing: border-box; 
            text-align: center; font-family: 'Outfit';

            marcas: [{pt:["Nike","Swoosh"],en:["Nike","Swoosh"]},{pt:["Apple","iPhone"],en:["Apple","iPhone"]},{pt:["Netflix","Série"],en:["Netflix","Series"]},{pt:["Disney","Castelo"],en:["Disney","Castle"]},{pt:["McDonalds","M"],en:["McDonalds","M"]},{pt:["Google","Pesquisa"],en:["Google","Search"]},{pt:["Coca-Cola","Lata"],en:["Coca-Cola","Can"]},{pt:["Ferrari","Vermelho"],en:["Ferrari","Red"]},{pt:["WhatsApp","Mensagem"],en:["WhatsApp","Message"]},{pt:["Instagram","Story"],en:["Instagram","Story"]},{pt:["Amazon","Caixa"],en:["Amazon","Box"]},{pt:["Adidas","Listra"],en:["Adidas","Stripe"]},{pt:["Samsung","Coreia"],en:["Samsung","Korea"]},{pt:["Sony","PlayStation"],en:["Sony","PlayStation"]},{pt:["Microsoft","Windows"],en:["Microsoft","Windows"]},{pt:["Lego","Bloco"],en:["Lego","Block"]},{pt:["Barbie","Rosa"],en:["Barbie","Pink"]},{pt:["Uber","Carro"],en:["Uber","Car"]},{pt:["YouTube","Vídeo"],en:["YouTube","Video"]},{pt:["Spotify","Playlist"],en:["Spotify","Playlist"]}],
            filmes: [{pt:["Batman","Capa"],en:["Batman","Cape"]},{pt:["Harry Potter","Varinha"],en:["Harry Potter","Wand"]},{pt:["Shrek","Pântano"],en:["Shrek","Swamp"]},{pt:["Matrix","Verde"],en:["Matrix","Green"]},{pt:["Titanic","Iceberg"],en:["Titanic","Iceberg"]},{pt:["Frozen","Neve"],en:["Frozen","Snow"]},{pt:["Vingadores","Joias"],en:["Avengers","Jewels"]},{pt:["Star Wars","Força"],en:["Star Wars","Force"]},{pt:["Coringa","Maquiagem"],en:["Joker","Makeup"]},{pt:["Avatar","Natureza"],en:["Avatar","Nature"]},{pt:["Jurassic Park","DNA"],en:["Jurassic Park","DNA"]},{pt:["O Rei Leão","Pedra"],en:["The Lion King","Rock"]},{pt:["Toy Story","Brinquedo"],en:["Toy Story","Toy"]},{pt:["Procurando Nemo","Aquário"],en:["Finding Nemo","Aquarium"]},{pt:["Up","Balão"],en:["Up","Balloon"]},{pt:["Madagascar","Zebra"],en:["Madagascar","Zebra"]},{pt:["Minions","Amarelo"],en:["Minions","Yellow"]},{pt:["Cinderela","Sapato"],en:["Cinderella","Shoe"]},{pt:["Homem-Aranha","Teia"],en:["Spider-Man","Web"]},{pt:["Coraline","Botão"],en:["Coraline","Button"]}]
        };
        wordBank.geral = [...wordBank.animais, ...wordBank.comida, ...wordBank.profissoes, ...wordBank.objetos, ...wordBank.lugares, ...wordBank.marcas, ...wordBank.filmes];

        let myName="", currentRoom="", isHost=false, onlineData=null, localPlayers=[], localIdx=0, localFakeIdx=-1, localPair=[];

        function showScreen(id){
            document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function trocarIdioma(sigla){
            idiomaAtual = sigla; const t = linguas[sigla];
            document.querySelectorAll('.lang-titulo').forEach(e=>e.innerText=t.titulo);
            document.querySelectorAll('.lang-btnLocal').forEach(e=>e.innerText=t.btnLocal);
            document.querySelectorAll('.lang-btnOnline').forEach(e=>e.innerText=t.btnOnline);
            document.querySelectorAll('.lang-comoJogar').forEach(e=>e.innerText=t.comoJogar);
            document.querySelectorAll('.lang-jogoLocal').forEach(e=>e.innerText=t.jogoLocal);
            document.querySelectorAll('.lang-maisJogador').forEach(e=>e.innerText=t.maisJogador);
            document.querySelectorAll('.lang-comecar').forEach(e=>e.innerText=t.comecar);
            document.querySelectorAll('.lang-online').forEach(e=>e.innerText=t.online);
            document.querySelectorAll('.lang-entrar').forEach(e=>e.innerText=t.entrar);
            document.querySelectorAll('.lang-ola').forEach(e=>e.innerText=t.ola);
            document.querySelectorAll('.lang-criarSala').forEach(e=>e.innerText=t.criarSala);
            document.querySelectorAll('.lang-entrarSala').forEach(e=>e.innerText=t.entrarSala);
            document.querySelectorAll('.lang-tema').forEach(e=>e.innerText=t.tema);
            document.querySelectorAll('.lang-aguardando').forEach(e=>e.innerText=t.aguardando);
            document.querySelectorAll('.lang-suaCobertura').forEach(e=>e.innerText=t.suaCobertura);
            document.querySelectorAll('.lang-verPalavra').forEach(e=>e.innerText=t.verPalavra);
            document.querySelectorAll('.lang-horaVotar').forEach(e=>e.innerText=t.horaVotar);
            document.querySelectorAll('.lang-fim').forEach(e=>e.innerText=t.fim);
            document.querySelectorAll('.lang-impostorEra').forEach(e=>e.innerText=t.impostorEra);
            document.querySelectorAll('.lang-palavraEra').forEach(e=>e.innerText=t.palavraEra);
            document.querySelectorAll('.lang-entendi').forEach(e=>e.innerText=t.entendi);
            document.getElementById('tut-desc').innerHTML = t.instrucoes;
            
            const localTheme = document.getElementById('local-theme');
            const roomTheme = document.getElementById('room-theme');
            [localTheme, roomTheme].forEach(sel => {
                if(!sel) return; sel.innerHTML = "";
                Object.keys(t.temas).forEach(k => {
                    let opt = document.createElement('option'); opt.value = k; opt.innerText = t.temas[k]; sel.appendChild(opt);
                });
            });
        }

        function initMode(m){ m==='local' ? showScreen('screen-setup-local') : showScreen('screen-login'); }
        function toggleTutorial(s){ document.getElementById('modal-tutorial').classList.toggle('hidden', !s); }
        function addLocalField(){
            let inp = document.createElement('input'); inp.className='local-name-in';
            inp.placeholder = (idiomaAtual==='pt'?'Jogador ':'Player ') + (document.querySelectorAll('.local-name-in').length+1);
            document.getElementById('local-names-container').appendChild(inp);
        }

        function startLocalGame(){
            localPlayers = Array.from(document.querySelectorAll('.local-name-in')).map((i,k)=>i.value || i.placeholder);
            if(localPlayers.length<3) return alert("Mínimo 3 jogadores!");
            const theme = document.getElementById('local-theme').value;
            localPair = wordBank[theme][Math.floor(Math.random()*wordBank[theme].length)];
            localFakeIdx = Math.floor(Math.random()*localPlayers.length);
            localIdx = 0; setupLocalTurn();
        }

        function setupLocalTurn(){
            showScreen('screen-game');
            document.getElementById('game-player-name').innerText = localPlayers[localIdx];
            document.getElementById('game-content').classList.add('hidden');
            document.getElementById('view-btn').innerText = linguas[idiomaAtual].verPalavra;
            document.getElementById('host-reveal-btn').classList.add('hidden');
            
            const isFake = (localIdx === localFakeIdx);
            document.getElementById('game-word').innerText = isFake ? linguas[idiomaAtual].fake : localPair[idiomaAtual][0];
            document.getElementById('game-word').style.color = isFake ? "var(--accent)" : "white";
            document.getElementById('game-fake-hint').classList.toggle('hidden', !isFake);
            document.getElementById('game-hint-text').innerText = localPair[idiomaAtual][1];
        }

        function toggleView(){
            const content = document.getElementById('game-content');
            if(content.classList.contains('hidden')){
                content.classList.remove('hidden');
                document.getElementById('view-btn').innerText = "OK!";
            } else {
                if(localIdx < localPlayers.length - 1){ localIdx++; setupLocalTurn(); }
                else { 
                    showScreen('screen-end'); 
                    document.getElementById('end-fakes').innerText=localPlayers[localFakeIdx]; 
                    document.getElementById('end-word').innerText=localPair[idiomaAtual][0]; 
                    document.getElementById('host-reset-btn').classList.add('hidden');
                }
            }
        }

        function enterOnlineMenu(){
            myName = document.getElementById('user-name').value.trim();
            if(!myName) return alert("Diga seu nome!"); 
            document.getElementById('display-name').innerText = myName;
            showScreen('screen-menu-online');
        }

        function createRoomAction(){
            const code = Math.floor(1000 + Math.random()*9000).toString();
            rtdb.ref('rooms/'+code).set({ host:myName, theme:document.getElementById('room-theme').value, status:"waiting", players:{[myName]:true} });
            joinRoomLogic(code);
        }

        function joinRoomAction(){
            const code = document.getElementById('join-code').value;
            rtdb.ref('rooms/'+code).once('value', s => {
                if(s.exists()){ rtdb.ref(`rooms/${code}/players/${myName}`).set(true); joinRoomLogic(code); }
                else alert("Sala não encontrada!");
            });
        }

        function joinRoomLogic(code){
            currentRoom = code; showScreen('screen-lobby');
            document.getElementById('display-code').innerText = code;
            document.getElementById('chat-toggle-btn').classList.remove('hidden');
            rtdb.ref('rooms/'+code).on('value', s => {
                const data = s.val(); if(!data) return;
                onlineData = data; isHost = (data.host === myName);
                document.getElementById('player-list').innerHTML = Object.keys(data.players).map(p => `<span class="player-tag">${p} ${p===data.host?'👑':''}</span>`).join("");
                document.getElementById('host-start-btn').classList.toggle('hidden', !isHost || data.status !== "waiting");
                if(data.status === "playing") setupOnlineGame(data);
                if(data.status === "voting") setupOnlineVoting(data);
                if(data.status === "revealing") setupOnlineEnd(data);
                if(data.status === "waiting") showScreen('screen-lobby');
            });
            rtdb.ref(`rooms/${code}/chat`).on('value', s => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                s.forEach(c => { box.innerHTML += `<div class="msg"><b>${c.val().name}:</b> ${c.val().msg}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function hostStartGame(){
            const theme = onlineData.theme; const pair = wordBank[theme][Math.floor(Math.random()*wordBank[theme].length)];
            const players = Object.keys(onlineData.players); const fake = players[Math.floor(Math.random()*players.length)];
            rtdb.ref('rooms/'+currentRoom).update({ status:"playing", wordPT:pair.pt[0], hintPT:pair.pt[1], wordEN:pair.en[0], hintEN:pair.en[1], fake:fake, votes:null });
        }

        function setupOnlineGame(data){
            showScreen('screen-game'); document.getElementById('game-player-name').innerText = myName;
            const isFake = (data.fake === myName);
            const word = (idiomaAtual==='pt' ? data.wordPT : data.wordEN);
            const hint = (idiomaAtual==='pt' ? data.hintPT : data.hintEN);
            document.getElementById('game-content').classList.add('hidden');
            document.getElementById('view-btn').innerText = linguas[idiomaAtual].verPalavra;
            document.getElementById('game-word').innerText = isFake ? linguas[idiomaAtual].fake : word;
            document.getElementById('game-word').style.color = isFake ? "var(--accent)" : "white";
            document.getElementById('game-fake-hint').classList.toggle('hidden', !isFake);
            document.getElementById('game-hint-text').innerText = hint;
            document.getElementById('view-btn').onclick = () => document.getElementById('game-content').classList.toggle('hidden');
            if(isHost) document.getElementById('host-reveal-btn').classList.remove('hidden');
        }

        function setupOnlineVoting(data){
            showScreen('screen-voting'); const list = document.getElementById('voting-list'); list.innerHTML = "";
            Object.keys(data.players).forEach(p => {
                let b = document.createElement('button'); b.className='btn-main btn-outline'; b.innerText=p;
                b.onclick = () => { rtdb.ref(`rooms/${currentRoom}/votes/${myName}`).set(p); list.innerHTML="<h3 style='color:var(--primary)'>VOTO REGISTRADO!</h3>"; };
                list.appendChild(b);
            });
            if(isHost) document.getElementById('host-finish-vote-btn').classList.remove('hidden');
        }

        function hostTriggerReveal(){ rtdb.ref('rooms/'+currentRoom).update({status:"revealing"}); }

        function setupOnlineEnd(data){
            showScreen('screen-end'); 
            document.getElementById('end-fakes').innerText = data.fake;
            document.getElementById('end-word').innerText = (idiomaAtual==='pt' ? data.wordPT : data.wordEN);
            if(isHost) document.getElementById('host-reset-btn').classList.remove('hidden');
        }

        function hostResetRoom(){ rtdb.ref('rooms/'+currentRoom).update({status:"waiting", fake:null, votes:null, chat:null}); }
        function toggleChat() { 
            const chat = document.getElementById('chat-container');
            const btn = document.getElementById('chat-toggle-btn');
            chat.classList.toggle('open'); 
            
            // Se o chat abrir, empurra o botão para cima e muda a cor/ícone
            if (chat.classList.contains('open')) {
                btn.style.bottom = 'calc(40% + 15px)';
                btn.style.background = 'var(--danger)';
                btn.innerText = '❌';
            } else {
                // Se fechar, volta para o padrão no canto inferior
                btn.style.bottom = '20px';
                btn.style.background = 'var(--primary)';
                btn.innerText = '💬';
            }
        }
        function sendMessage(){
            const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
            rtdb.ref(`rooms/${currentRoom}/chat`).push({name:myName, msg:inp.value}); inp.value="";
        }

        window.onload = () => trocarIdioma('pt');
    </script>
